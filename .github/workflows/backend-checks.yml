name: Backend Checks

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: backend-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-backend:
    name: Backend checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies for docs verification
        run: pnpm install --frozen-lockfile

      - name: Install Tauri Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libgbm-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libpipewire-0.3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Swift runtime paths for macOS Rust tests
        if: matrix.os == 'macos-14'
        run: |
          SWIFT_RUNTIME_ROOT="$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift"
          SWIFT_RUNTIME_PATHS="${SWIFT_RUNTIME_ROOT}/macosx:${SWIFT_RUNTIME_ROOT}:/usr/lib/swift"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${SWIFT_RUNTIME_PATHS}:${DYLD_FALLBACK_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=${SWIFT_RUNTIME_PATHS}:${DYLD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Enforce Rust formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml --check

      - name: Compile Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run Rust backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Rust backend
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Verify documentation links
        run: pnpm run verify:docs
