name: Release Artifacts

on:
  pull_request_target:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-artifacts-main
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare desktop release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.desktop-changed.outputs.desktop_changed }}
      release_tag: ${{ steps.release-metadata.outputs.release_tag }}
      release_version: ${{ steps.release-metadata.outputs.release_version }}
      release_sha: ${{ steps.release-metadata.outputs.release_sha }}
    steps:
      - name: Checkout merged main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect release-relevant changes
        id: desktop-changed
        uses: actions/github-script@v7
        with:
          script: |
            const ignoredDesktopFiles = new Set([
              "apps/desktop/package.json",
              "apps/desktop/src-tauri/Cargo.toml",
              "apps/desktop/src-tauri/tauri.conf.json",
            ]);
            const releaseTriggerFiles = new Set([
              ".github/workflows/release-artifacts.yml",
              "apps/landing/lib/downloads.ts",
            ]);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const desktopChanged = files.some(({ filename }) =>
              releaseTriggerFiles.has(filename) ||
              (filename.startsWith("apps/desktop/") && !ignoredDesktopFiles.has(filename)),
            );

            core.setOutput("desktop_changed", desktopChanged ? "true" : "false");

            if (!desktopChanged) {
              core.notice(
                "Merged PR did not change desktop app files or release/download metadata, skipping release.",
              );
            }

      - name: Detect existing release bump for this PR
        id: existing-release
        if: steps.desktop-changed.outputs.desktop_changed == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          existing_entry="$(git log --format='%H%x09%s' --grep "^chore: bump desktop version for PR #$PR_NUMBER to v" -n 1)"
          if [ -z "$existing_entry" ]; then
            echo "already_released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_sha="${existing_entry%%$'\t'*}"
          subject="${existing_entry#*$'\t'}"
          release_tag="${subject##* to }"
          release_version="${release_tag#v}"

          echo "already_released=true" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Bump desktop patch version
        id: version
        if: steps.desktop-changed.outputs.desktop_changed == 'true' && steps.existing-release.outputs.already_released != 'true'
        run: |
          result="$(node ./scripts/bump-desktop-version.mjs)"
          echo "$result"
          release_version="$(printf '%s' "$result" | node -e 'const data = JSON.parse(require("node:fs").readFileSync(0, "utf8")); process.stdout.write(data.nextVersion)')"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$release_version" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        id: push
        if: steps.desktop-changed.outputs.desktop_changed == 'true' && steps.existing-release.outputs.already_released != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/package.json apps/desktop/src-tauri/Cargo.toml apps/desktop/src-tauri/tauri.conf.json
          git commit -m "chore: bump desktop version for PR #${{ github.event.pull_request.number }} to ${{ steps.version.outputs.release_tag }}"
          git push origin HEAD:main
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata
        id: release-metadata
        if: steps.desktop-changed.outputs.desktop_changed == 'true'
        run: |
          if [ "${{ steps.existing-release.outputs.already_released }}" = "true" ]; then
            echo "release_tag=${{ steps.existing-release.outputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "release_version=${{ steps.existing-release.outputs.release_version }}" >> "$GITHUB_OUTPUT"
            echo "release_sha=${{ steps.existing-release.outputs.release_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${{ steps.version.outputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "release_version=${{ steps.version.outputs.release_version }}" >> "$GITHUB_OUTPUT"
            echo "release_sha=${{ steps.push.outputs.release_sha }}" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    name: Build macOS artifact (${{ matrix.label }})
    if: needs.prepare-release.outputs.should_release == 'true'
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-arm64
            label: apple-silicon
            output_name: openrec-macos-apple-silicon.dmg
          - runner: macos-15-intel
            label: intel
            output_name: openrec-macos-intel.dmg

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Swift runtime paths for macOS bundling
        run: |
          SWIFT_RUNTIME_ROOT="$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift"
          SWIFT_RUNTIME_PATHS="${SWIFT_RUNTIME_ROOT}/macosx:${SWIFT_RUNTIME_ROOT}:/usr/lib/swift"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${SWIFT_RUNTIME_PATHS}:${DYLD_FALLBACK_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=${SWIFT_RUNTIME_PATHS}:${DYLD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify documentation links
        run: pnpm run verify:docs

      - name: Verify desktop frontend constraints
        run: pnpm exec turbo run check --filter=@openrec/desktop

      - name: Run desktop frontend regression tests
        run: pnpm exec turbo run test --filter=@openrec/desktop

      - name: Build unsigned DMG
        run: pnpm --filter @openrec/desktop run bundle:macos

      - name: Stage artifact with stable filename
        run: |
          mkdir -p release-artifacts
          dmg_path="$(echo apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg)"
          cp "$dmg_path" "release-artifacts/${{ matrix.output_name }}"
          shasum -a 256 "release-artifacts/${{ matrix.output_name }}" > "release-artifacts/${{ matrix.output_name }}.sha256"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: |
            release-artifacts/${{ matrix.output_name }}
            release-artifacts/${{ matrix.output_name }}.sha256
          if-no-files-found: error

  build-linux:
    name: Build Linux artifacts
    if: needs.prepare-release.outputs.should_release == 'true'
    needs: prepare-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Tauri Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgbm-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libpipewire-0.3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify documentation links
        run: pnpm run verify:docs

      - name: Verify desktop frontend constraints
        run: pnpm exec turbo run check --filter=@openrec/desktop

      - name: Run desktop frontend regression tests
        run: pnpm exec turbo run test --filter=@openrec/desktop

      - name: Build Linux bundles
        env:
          NO_STRIP: "true"
        run: pnpm --filter @openrec/desktop run bundle:linux

      - name: Stage artifacts with stable filenames
        run: |
          mkdir -p release-artifacts
          appimage_path="$(echo apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage)"
          deb_path="$(echo apps/desktop/src-tauri/target/release/bundle/deb/*.deb)"
          cp "$appimage_path" "release-artifacts/openrec-linux-x86_64.AppImage"
          cp "$deb_path" "release-artifacts/openrec-linux-x86_64.deb"
          shasum -a 256 "release-artifacts/openrec-linux-x86_64.AppImage" > "release-artifacts/openrec-linux-x86_64.AppImage.sha256"
          shasum -a 256 "release-artifacts/openrec-linux-x86_64.deb" > "release-artifacts/openrec-linux-x86_64.deb.sha256"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openrec-linux-artifacts
          path: |
            release-artifacts/openrec-linux-x86_64.AppImage
            release-artifacts/openrec-linux-x86_64.AppImage.sha256
            release-artifacts/openrec-linux-x86_64.deb
            release-artifacts/openrec-linux-x86_64.deb.sha256
          if-no-files-found: error

  upload-release-assets:
    name: Upload artifacts to GitHub Release
    if: needs.prepare-release.outputs.should_release == 'true'
    needs: [prepare-release, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Build release notes attachments
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          cat > dist-artifacts/UNSIGNED_BUILD_NOTES.md <<'EOF'
          # OpenRec release builds

          macOS binaries are intentionally unsigned (`signingIdentity: null`).
          On first launch macOS Gatekeeper will block the app; use:

          1. Finder → Applications
          2. Right-click `Open Rec.app`
          3. Click **Open** and confirm

          Linux bundles target x86_64 systems and expect `ffmpeg` on `PATH`.
          Also grant Screen Recording/Microphone/Camera permissions when prompted.

          For full instructions see `docs/UNSIGNED_MAC_INSTALL.md`.
          EOF
          cat > dist-artifacts/RELEASE_CHANGELOG.md <<EOF
          # OpenRec $RELEASE_TAG

          Automated desktop release for merged PR #$PR_NUMBER.

          Source PR title: $PR_TITLE
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
        run: |
          shopt -s globstar nullglob
          binary_files=(
            dist-artifacts/**/*.dmg
            dist-artifacts/**/*.AppImage
            dist-artifacts/**/*.deb
          )
          files=(
            "${binary_files[@]}"
            dist-artifacts/**/*.sha256
            dist-artifacts/UNSIGNED_BUILD_NOTES.md
          )

          if [ "${#binary_files[@]}" -eq 0 ]; then
            echo "No desktop binaries were produced."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "OpenRec $RELEASE_TAG" \
              --notes-file dist-artifacts/RELEASE_CHANGELOG.md
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
            exit 0
          fi

          gh release create "$RELEASE_TAG" "${files[@]}" \
            --target "$RELEASE_SHA" \
            --title "OpenRec $RELEASE_TAG" \
            --notes-file dist-artifacts/RELEASE_CHANGELOG.md
