name: Frontend Checks

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: frontend-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify documentation links
        run: pnpm run verify:docs

      - name: Run frontend checks
        run: pnpm exec turbo run check --filter=@openrec/desktop --filter=@openrec/landing

      - name: Run desktop frontend regression tests
        run: pnpm exec turbo run test --filter=@openrec/desktop

      - name: Build frontend apps
        run: pnpm exec turbo run build --filter=@openrec/desktop --filter=@openrec/landing
